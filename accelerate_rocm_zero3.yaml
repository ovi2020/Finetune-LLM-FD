# accelerate_rocm_zero3.yaml
# ─────────────────────────────────────────────────────────────────
# HuggingFace Accelerate config for 70B model on 4-8× MI300X GPUs
# Uses DeepSpeed ZeRO-3 (shards model params across all GPUs)
#
# Usage:
#   accelerate launch --config_file accelerate_rocm_zero3.yaml \
#       04_finetune_granite_rocm.py \
#       --model ibm-granite/granite-3.3-70b-instruct
# ─────────────────────────────────────────────────────────────────
compute_environment: LOCAL_MACHINE
distributed_type: DEEPSPEED
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 8           # all 8 × MI300X GPUs
use_cpu: false

deepspeed_config:
  deepspeed_config_file: ds_zero3_rocm.json
  zero3_init_flag: true
